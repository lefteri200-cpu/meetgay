<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nostalgia - Chat Belgique</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .welcome-box {
            background: white;
            border-radius: 20px;
            padding: 50px;
            max-width: 600px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        }

        h1 {
            font-size: 48px;
            color: #667eea;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 40px;
            font-size: 18px;
        }

        .lang-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 30px;
        }

        .lang-btn {
            padding: 15px 40px;
            font-size: 24px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-family: inherit;
        }

        .lang-btn.fr {
            background: #0055a4;
            color: white;
        }

        .lang-btn.nl {
            background: #ff6600;
            color: white;
        }

        .lang-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .features {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .feature {
            text-align: center;
            font-size: 14px;
            color: #666;
        }

        .feature span {
            font-size: 30px;
            display: block;
            margin-bottom: 8px;
        }

        .age-warning {
            margin-top: 30px;
            padding: 10px;
            background: #fff3cd;
            border-radius: 10px;
            font-size: 12px;
            color: #856404;
        }

        footer {
            text-align: center;
            padding: 20px;
            background: rgba(0, 0, 0, 0.1);
            color: white;
            font-size: 12px;
        }

        footer a {
            color: white;
            text-decoration: none;
            margin: 0 10px;
        }

        footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 600px) {
            .welcome-box {
                padding: 30px;
            }

            h1 {
                font-size: 32px;
            }

            .lang-btn {
                padding: 10px 25px;
                font-size: 18px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="welcome-box">
            <h1>💬 Nostalgia</h1>
            <div class="subtitle">Belgique - Rencontres et discussions</div>

            <div class="lang-buttons">
                <button class="lang-btn fr" onclick="chooseLanguage('fr')">🇫🇷 Français</button>
                <button class="lang-btn nl" onclick="chooseLanguage('nl')">🇳🇱 Nederlands</button>
            </div>

            <div class="features">
                <div class="feature"><span>✉️</span> Messages privés</div>
                <div class="feature"><span>👥</span> Rencontres belges</div>
                <div class="feature"><span>💬</span> Chat instantané</div>
            </div>

            <div class="age-warning">
                ⚠️ Site réservé aux personnes majeures (18+)
            </div>
        </div>
    </div>
    <footer>
        © 2025 Nostalgia - Chat Belgique -
        <a href="#">Mentions légales</a> -
        <a href="#">Contact</a>
    </footer>

    <script>
        function chooseLanguage(lang) {
            localStorage.setItem('nostalgia_lang', lang);
            window.location.href = '/login.html';
        }
    </script>
</body>

</html>
